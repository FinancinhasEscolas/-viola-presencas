<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Presença – Viola Viva</title>

  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>

<body>
  <header>
    <h1 id="titulo">Lista de Presença</h1>
    <p id="subtitulo"></p>
  </header>

  <div class="barra">
    <label>Professor:</label>
    <select id="professor">
      <option value="">Selecione</option>
      <option value="PRETO">Professor Preto</option>
      <option value="CHICO">Professor Chico</option>
    </select>

    <label>Data:</label>
    <input type="date" id="data">
    <span id="status"></span>
  </div>

  <main id="lista"></main>

  <footer>
    Projeto Viola Viva – Sicoob Credivertentes
  </footer>

<script>
const API = window.APP_CONFIG.API_URL;

const selProfessor = document.getElementById("professor");
const lista = document.getElementById("lista");
const titulo = document.getElementById("titulo");
const subtitulo = document.getElementById("subtitulo");
const dataInput = document.getElementById("data");
const statusTxt = document.getElementById("status");

// data de hoje
const hoje = new Date();
hoje.setMinutes(hoje.getMinutes() - hoje.getTimezoneOffset());
dataInput.value = hoje.toISOString().slice(0,10);

selProfessor.addEventListener("change", carregar);

async function carregar(){
  const prof = selProfessor.value;
  if(!prof){
    lista.innerHTML = "";
    return;
  }

  statusTxt.textContent = "Carregando...";
  lista.innerHTML = "";

  try{
    const resp = await fetch(`${API}?action=context&prof=${prof}`);
    const json = await resp.json();

    if(!json.ok){
      statusTxt.textContent = "Erro ao carregar dados";
      return;
    }

    titulo.textContent = "Lista de Presença – " + json.professor.nome;
    subtitulo.textContent = json.professor.turma;
    dataInput.value = json.data;

    json.alunos.forEach(aluno => {
      const linha = document.createElement("div");
      linha.className = "aluno";

      linha.innerHTML = `
        <span>${aluno}</span>
        <div>
          <button class="p" onclick="marcar('${aluno}','P')">P</button>
          <button class="f" onclick="marcar('${aluno}','F')">F</button>
        </div>
      `;
      lista.appendChild(linha);
    });

    statusTxt.textContent = "";
  } catch(e){
    statusTxt.textContent = "Falha de conexão";
  }
}

async function marcar(aluno, status){
  const body = new URLSearchParams({
    action: "salvar",
    data: dataInput.value,
    turma: subtitulo.textContent,
    aluno: aluno,
    status: status,
    professor: titulo.textContent.replace("Lista de Presença – ","")
  });

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/x-www-form-urlencoded"},
    body
  });
}
</script>
</body>
</html>
